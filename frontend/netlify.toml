[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy media files to the backend so image URLs like /media/... work on Netlify
[[redirects]]
  from = "/media/*"
  to = "https://edu-track-15m3.onrender.com/media/:splat"
  status = 200

# Proxy static files to the backend if referenced from the frontend
[[redirects]]
  from = "/static/*"
  to = "https://edu-track-15m3.onrender.com/static/:splat"
  status = 200
